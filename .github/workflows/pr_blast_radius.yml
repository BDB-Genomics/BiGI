name: BiGI Blast Radius Report
on:
  pull_request:
    branches: [ main, master ]

permissions:
  pull-requests: write

jobs:
  analyze-impact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Need full history to compute diffs

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install BiGI
        run: pip install -e .

      - name: Run BiGI Analysis
        run: bigi analyze .
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}

      - name: Generate PR Impact Report
        run: bigi pr-report --output pr_comment.md --pipeline-dir .

      - name: Post Comment on PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: pr_comment.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
